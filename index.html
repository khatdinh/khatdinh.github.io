<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💕 Will You Be My Valentine? 💕</title>
    
    <!-- Favicon -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💕</text></svg>">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
    
    <!-- React and ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel Standalone for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Lucide React Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;
        const Heart = ({ className, fill, size = 24, ...props }) => {
            return (
                <svg 
                    xmlns="http://www.w3.org/2000/svg" 
                    width={size} 
                    height={size} 
                    viewBox="0 0 24 24" 
                    fill={fill || "none"}
                    stroke="currentColor" 
                    strokeWidth="2" 
                    strokeLinecap="round" 
                    strokeLinejoin="round" 
                    className={className}
                    {...props}
                >
                    <path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/>
                </svg>
            );
        };

        const Sparkles = ({ className, size = 24, ...props }) => {
            return (
                <svg 
                    xmlns="http://www.w3.org/2000/svg" 
                    width={size} 
                    height={size} 
                    viewBox="0 0 24 24" 
                    fill="none" 
                    stroke="currentColor" 
                    strokeWidth="2" 
                    strokeLinecap="round" 
                    strokeLinejoin="round" 
                    className={className}
                    {...props}
                >
                    <path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/>
                    <path d="M5 3v4"/>
                    <path d="M19 17v4"/>
                    <path d="M3 5h4"/>
                    <path d="M17 19h4"/>
                </svg>
            );
        };

        function ValentineProposal() {
            const [noClickCount, setNoClickCount] = useState(0);
            const [noButtonPosition, setNoButtonPosition] = useState({ x: 0, y: 0 });
            const [showSuccess, setShowSuccess] = useState(false);
            const [confetti, setConfetti] = useState([]);

            // Generate confetti particles
            const generateConfetti = () => {
                const pieces = [];
                for (let i = 0; i < 50; i++) {
                    pieces.push({
                        id: i,
                        left: Math.random() * 100,
                        delay: Math.random() * 0.5,
                        duration: 2 + Math.random() * 2,
                    });
                }
                setConfetti(pieces);
            };

            const handleNoClick = (e) => {
                e.preventDefault();
                setNoClickCount(prev => prev + 1);
                
                // Calculate new random position
                const button = e.currentTarget;
                const buttonRect = button.getBoundingClientRect();
                const viewportWidth = window.innerWidth;
                const viewportHeight = window.innerHeight;
                
                // Keep button within viewport
                const maxX = viewportWidth - buttonRect.width - 20;
                const maxY = viewportHeight - buttonRect.height - 20;
                
                const newX = Math.random() * maxX;
                const newY = Math.random() * maxY;
                
                setNoButtonPosition({ x: newX, y: newY });
            };

            const handleYesClick = () => {
                setShowSuccess(true);
                generateConfetti();
            };

            // Calculate button scale based on click count
            const getNoButtonScale = () => {
                if (noClickCount === 0) return 1;
                return Math.max(0.1, Math.pow(0.8, noClickCount));
            };

            const getNoButtonStyle = () => {
                const scale = getNoButtonScale();
                const baseStyle = {
                    transform: `scale(${scale})`,
                    transition: 'transform 0.3s ease',
                    cursor: scale < 0.3 ? 'help' : 'pointer',
                };

                if (noClickCount > 0) {
                    return {
                        ...baseStyle,
                        position: 'fixed',
                        left: `${noButtonPosition.x}px`,
                        top: `${noButtonPosition.y}px`,
                    };
                }

                return baseStyle;
            };

            const getNoButtonText = () => {
                if (noClickCount === 0) return "No, sorry...";
                if (noClickCount === 1) return "Wait, maybe...";
                if (noClickCount === 2) return "Actually...";
                if (noClickCount === 3) return "Hold on...";
                if (noClickCount === 4) return "Umm...";
                if (noClickCount === 5) return "Please baby";
		if (noClickCount === 6) return "bebe";
		if (noClickCount === 7) return "honey";
		if (noClickCount >= 8) return "stop pls";
            };

            if (showSuccess) {
                return (
                    <div className="min-h-screen flex items-center justify-center relative overflow-hidden bg-gradient-to-br from-pink-100 via-rose-100 to-red-100">
                        {/* Confetti */}
                        {confetti.map(piece => (
                            <div
                                key={piece.id}
                                className="absolute w-3 h-3 animate-fall"
                                style={{
                                    left: `${piece.left}%`,
                                    animationDelay: `${piece.delay}s`,
                                    animationDuration: `${piece.duration}s`,
                                    backgroundColor: ['#ff69b4', '#ff1493', '#ffc0cb', '#ff6b9d', '#c71585'][piece.id % 5],
                                }}
                            />
                        ))}
                        
                        <div className="text-center z-10 animate-bounce-in">
                            <div className="mb-8 animate-spin-slow">
                                <img 
                                    src="https://media3.giphy.com/media/v1.Y2lkPTc5MGI3NjExZDJ3bW1zZDV1cGl6OXJhM3UwbW9rYTdvMjFkNW5keHZrYzZpcXd6ayZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/vqvmGLZdqxNzCtVlR3/giphy.gif" 
                                    alt="Celebration" 
                                    className="w-80 h-80 mx-auto rounded-full shadow-2xl"
                                />
                            </div>
                            <h1 className="text-7xl font-bold mb-4 animate-pulse" style={{ fontFamily: "'Pacifico', cursive" }}>
                                <span className="bg-gradient-to-r from-pink-500 via-red-500 to-pink-600 text-transparent bg-clip-text">
                                    Yay! 💕
                                </span>
                            </h1>
                            <p className="text-3xl text-rose-600 font-semibold" style={{ fontFamily: "'Quicksand', sans-serif" }}>
                                I knew you'd say yes! ✨
                            </p>
                            <div className="mt-8 flex justify-center gap-4">
                                <Heart className="w-8 h-8 text-red-500 animate-pulse" fill="currentColor" />
                                <Sparkles className="w-8 h-8 text-pink-500 animate-pulse" />
                                <Heart className="w-8 h-8 text-red-500 animate-pulse" fill="currentColor" />
                            </div>
                        </div>

                        <style>{`
                            @keyframes fall {
                                to {
                                    transform: translateY(100vh) rotate(360deg);
                                    opacity: 0;
                                }
                            }
                            
                            @keyframes bounce-in {
                                0% {
                                    transform: scale(0);
                                    opacity: 0;
                                }
                                50% {
                                    transform: scale(1.1);
                                }
                                100% {
                                    transform: scale(1);
                                    opacity: 1;
                                }
                            }
                            
                            @keyframes spin-slow {
                                from {
                                    transform: rotate(0deg);
                                }
                                to {
                                    transform: rotate(360deg);
                                }
                            }
                            
                            .animate-fall {
                                animation: fall linear infinite;
                            }
                            
                            .animate-bounce-in {
                                animation: bounce-in 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55);
                            }
                            
                            .animate-spin-slow {
                                animation: spin-slow 20s linear infinite;
                            }
                        `}</style>
                    </div>
                );
            }

            return (
                <div className="min-h-screen flex items-center justify-center relative overflow-hidden bg-gradient-to-br from-pink-50 via-rose-50 to-red-50">
                    {/* Floating hearts background */}
                    <div className="absolute inset-0 overflow-hidden pointer-events-none">
                        {[...Array(15)].map((_, i) => (
                            <Heart
                                key={i}
                                className="absolute text-pink-300 opacity-20 animate-float"
                                style={{
                                    left: `${Math.random() * 100}%`,
                                    top: `${Math.random() * 100}%`,
                                    animationDelay: `${Math.random() * 5}s`,
                                    animationDuration: `${8 + Math.random() * 4}s`,
                                }}
                                size={20 + Math.random() * 40}
                                fill="currentColor"
                            />
                        ))}
                    </div>

                    {/* Main content */}
                    <div className="text-center z-10 px-4 max-w-2xl mx-auto">
                        {/* Kitty Image */}
                        <div className="mb-8 animate-float-gentle">
                            <img 
                                src="https://media.giphy.com/media/901mxGLGQN2PyCQpoc/giphy.gif" 
                                alt="Adorable pleading kitty with heart" 
                                className="w-64 h-64 mx-auto object-contain drop-shadow-2xl"
                            />
                        </div>

                        {/* Question */}
                        <h1 
                            className="text-6xl md:text-7xl font-bold mb-12 text-rose-600 animate-fade-in-down"
                            style={{ fontFamily: "'Pacifico', cursive" }}
                        >
                            Will you be my Valentine?
                        </h1>

                        {/* Buttons Container */}
                        <div className="flex justify-center items-center gap-8 flex-wrap relative min-h-[120px]">
                            {/* Yes Button - Heart shaped */}
                            <button
                                onClick={handleYesClick}
                                className="group relative animate-fade-in-up"
                                style={{ animationDelay: '0.2s' }}
                            >
                                <div className="absolute inset-0 bg-gradient-to-br from-red-400 to-pink-500 rounded-full blur-xl opacity-60 group-hover:opacity-80 transition-opacity" />
                                <div className="relative bg-gradient-to-br from-red-500 to-pink-600 text-white px-12 py-6 rounded-full text-2xl font-bold shadow-2xl transform hover:scale-110 transition-all duration-300 hover:shadow-pink-500/50 border-4 border-white"
                                    style={{ fontFamily: "'Quicksand', sans-serif" }}>
                                    <Heart className="inline-block w-6 h-6 mr-2 animate-pulse" fill="currentColor" />
                                    Yes, absolutely! 💖
                                    <Heart className="inline-block w-6 h-6 ml-2 animate-pulse" fill="currentColor" />
                                </div>
                            </button>

                            {/* No Button - Square, shrinking and moving */}
                            <button
                                onClick={handleNoClick}
                                className="bg-gray-400 hover:bg-gray-500 text-white px-8 py-4 text-xl font-semibold shadow-lg transition-colors duration-200 animate-fade-in-up"
                                style={{
                                    ...getNoButtonStyle(),
                                    animationDelay: '0.4s',
                                    fontFamily: "'Quicksand', sans-serif"
                                }}
                            >
                                {getNoButtonText()}
                            </button>
                        </div>

                        {/* Hint text */}
                        {noClickCount > 0 && (
                            <p className="mt-8 text-rose-400 text-lg animate-fade-in italic" style={{ fontFamily: "'Quicksand', sans-serif" }}>
                                {noClickCount === 1 && "The button is getting shy... 🙈"}
                                {noClickCount === 2 && "It's running away from you! 😅"}
                                {noClickCount === 3 && "Getting harder to catch, isn't it? 😏"}
                                {noClickCount === 4 && "Why are you doing this to yourself? 💔"}
                                {noClickCount >= 5 && "Just say yes already! 🥺"}
                            </p>
                        )}
                    </div>

                    <style>{`
                        @keyframes float {
                            0%, 100% {
                                transform: translateY(0) rotate(0deg);
                            }
                            50% {
                                transform: translateY(-20px) rotate(10deg);
                            }
                        }
                        
                        @keyframes float-gentle {
                            0%, 100% {
                                transform: translateY(0);
                            }
                            50% {
                                transform: translateY(-15px);
                            }
                        }
                        
                        @keyframes fade-in-down {
                            from {
                                opacity: 0;
                                transform: translateY(-30px);
                            }
                            to {
                                opacity: 1;
                                transform: translateY(0);
                            }
                        }
                        
                        @keyframes fade-in-up {
                            from {
                                opacity: 0;
                                transform: translateY(30px);
                            }
                            to {
                                opacity: 1;
                                transform: translateY(0);
                            }
                        }
                        
                        @keyframes fade-in {
                            from {
                                opacity: 0;
                            }
                            to {
                                opacity: 1;
                            }
                        }
                        
                        .animate-float {
                            animation: float 8s ease-in-out infinite;
                        }
                        
                        .animate-float-gentle {
                            animation: float-gentle 3s ease-in-out infinite;
                        }
                        
                        .animate-fade-in-down {
                            animation: fade-in-down 0.8s ease-out forwards;
                        }
                        
                        .animate-fade-in-up {
                            animation: fade-in-up 0.8s ease-out forwards;
                            opacity: 0;
                        }
                        
                        .animate-fade-in {
                            animation: fade-in 0.5s ease-out forwards;
                        }
                    `}</style>
                </div>
            );
        }

        // Render the app
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<ValentineProposal />);
    </script>
</body>
</html>
