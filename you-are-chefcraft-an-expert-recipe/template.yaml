AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: ChefCraft GPT wrapper using S3, CloudFront, Lambda Function URL, and Route 53.

Parameters:
  DomainName:
    Type: String
    Default: ""
    Description: Optional custom domain, such as recipes.example.com.
  HostedZoneId:
    Type: String
    Default: ""
    Description: Optional Route 53 hosted zone ID for the custom domain.
  OpenAIModel:
    Type: String
    Default: gpt-5-mini
    Description: OpenAI model used by the Lambda function.
  MaxConcurrentRequests:
    Type: Number
    Default: 2
    MinValue: 1
    MaxValue: 10
    Description: Cost guardrail for simultaneous Lambda executions.
  ApiOriginSecret:
    Type: String
    NoEcho: true
    MinLength: 24
    Description: Shared secret sent by CloudFront to Lambda. Generate a random value for production.

Conditions:
  UseDomain: !And
    - !Not [!Equals [!Ref DomainName, ""]]
    - !Not [!Equals [!Ref HostedZoneId, ""]]

Resources:
  SiteBucket:
    Type: AWS::S3::Bucket
    Properties:
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerEnforced

  SiteOriginAccessControl:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub "${AWS::StackName}-site-oac"
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  ApiFunction:
    Type: AWS::Serverless::Function
    Properties:
      Runtime: nodejs22.x
      Architectures:
        - arm64
      Handler: index.handler
      CodeUri: backend/
      Timeout: 35
      MemorySize: 256
      ReservedConcurrentExecutions: !Ref MaxConcurrentRequests
      Policies:
        - AWSLambdaBasicExecutionRole
      Environment:
        Variables:
          OPENAI_MODEL: !Ref OpenAIModel
          API_ORIGIN_SECRET: !Ref ApiOriginSecret

  ApiFunctionUrl:
    Type: AWS::Lambda::Url
    Properties:
      AuthType: NONE
      TargetFunctionArn: !Ref ApiFunction

  ApiFunctionUrlInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunctionUrl
      FunctionName: !Ref ApiFunction
      FunctionUrlAuthType: NONE
      Principal: "*"

  ApiFunctionInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref ApiFunction
      InvokedViaFunctionUrl: true
      Principal: "*"

  ApiOriginRequestPolicy:
    Type: AWS::CloudFront::OriginRequestPolicy
    Properties:
      OriginRequestPolicyConfig:
        Name: !Sub "${AWS::StackName}-api-origin-request"
        CookiesConfig:
          CookieBehavior: none
        HeadersConfig:
          HeaderBehavior: allExcept
          Headers:
            - host
        QueryStringsConfig:
          QueryStringBehavior: all

  ApiCachePolicy:
    Type: AWS::CloudFront::CachePolicy
    Properties:
      CachePolicyConfig:
        Name: !Sub "${AWS::StackName}-api-no-cache"
        DefaultTTL: 0
        MaxTTL: 1
        MinTTL: 0
        ParametersInCacheKeyAndForwardedToOrigin:
          CookiesConfig:
            CookieBehavior: none
          EnableAcceptEncodingBrotli: false
          EnableAcceptEncodingGzip: false
          HeadersConfig:
            HeaderBehavior: none
          QueryStringsConfig:
            QueryStringBehavior: none

  SiteCertificate:
    Type: AWS::CertificateManager::Certificate
    Condition: UseDomain
    Properties:
      DomainName: !Ref DomainName
      ValidationMethod: DNS
      DomainValidationOptions:
        - DomainName: !Ref DomainName
          HostedZoneId: !Ref HostedZoneId

  SiteDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        DefaultRootObject: index.html
        Aliases: !If
          - UseDomain
          - - !Ref DomainName
          - !Ref AWS::NoValue
        ViewerCertificate: !If
          - UseDomain
          - AcmCertificateArn: !Ref SiteCertificate
            MinimumProtocolVersion: TLSv1.2_2021
            SslSupportMethod: sni-only
          - CloudFrontDefaultCertificate: true
        Origins:
          - Id: site-origin
            DomainName: !GetAtt SiteBucket.RegionalDomainName
            S3OriginConfig:
              OriginAccessIdentity: ""
            OriginAccessControlId: !Ref SiteOriginAccessControl
          - Id: api-origin
            DomainName: !Select [2, !Split ["/", !GetAtt ApiFunctionUrl.FunctionUrl]]
            OriginCustomHeaders:
              - HeaderName: x-origin-secret
                HeaderValue: !Ref ApiOriginSecret
            CustomOriginConfig:
              HTTPSPort: 443
              OriginProtocolPolicy: https-only
              OriginSSLProtocols:
                - TLSv1.2
        DefaultCacheBehavior:
          TargetOriginId: site-origin
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods:
            - GET
            - HEAD
          CachedMethods:
            - GET
            - HEAD
          Compress: true
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6
        CacheBehaviors:
          - PathPattern: /api/*
            TargetOriginId: api-origin
            ViewerProtocolPolicy: redirect-to-https
            AllowedMethods:
              - DELETE
              - GET
              - HEAD
              - OPTIONS
              - PATCH
              - POST
              - PUT
            CachedMethods:
              - GET
              - HEAD
              - OPTIONS
            Compress: false
            CachePolicyId: !Ref ApiCachePolicy
            OriginRequestPolicyId: !Ref ApiOriginRequestPolicy

  SiteBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref SiteBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: AllowCloudFrontRead
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub "${SiteBucket.Arn}/*"
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub "arn:aws:cloudfront::${AWS::AccountId}:distribution/${SiteDistribution}"

  SiteAliasRecord:
    Type: AWS::Route53::RecordSet
    Condition: UseDomain
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: !Ref DomainName
      Type: A
      AliasTarget:
        DNSName: !GetAtt SiteDistribution.DomainName
        HostedZoneId: Z2FDTNDATAQYW2

Outputs:
  SiteUrl:
    Description: Public site URL.
    Value: !If
      - UseDomain
      - !Sub "https://${DomainName}"
      - !Sub "https://${SiteDistribution.DomainName}"
  SiteBucketName:
    Description: S3 bucket for frontend assets.
    Value: !Ref SiteBucket
  DistributionId:
    Description: CloudFront distribution ID.
    Value: !Ref SiteDistribution
  FunctionName:
    Description: Lambda function name.
    Value: !Ref ApiFunction
  FunctionUrl:
    Description: Direct Lambda Function URL.
    Value: !GetAtt ApiFunctionUrl.FunctionUrl
